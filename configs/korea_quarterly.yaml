# Korea Quarterly Factor Strategy Configuration
# Module A: 분기 팩터 투자 (한국 KOSPI200)

strategy:
  name: "KR-Quarterly-Factor"
  universe: "kospi200"
  exchange: "XKRX"

backtest:
  start_date: "2015-01-01"
  end_date: "2024-12-31"
  initial_capital: 100_000_000  # 1억원
  rebalance_freq: "Q"           # 분기 리밸런싱
  transaction_cost: 0.003       # 매수 0.015% + 매도 0.20% 증권거래세 근사치

  benchmark_tickers:
    - "069500"  # KODEX 200
    - "229200"  # KODEX KOSDAQ 150

data:
  start_date: "2015-01-01"  # 학습 데이터 시작
  end_date: "2024-12-31"
  source: "krx"             # pykrx + FinanceDataReader

ml:
  train_start: "2015-01-01"
  train_end: "2022-12-31"
  val_start: "2023-01-01"
  val_end: "2024-12-31"
  val_quarters: 4
  features:
    - "per"
    - "pbr"
    - "eps"
    - "bps"
    - "div_yield"
    - "roe"
    - "ret_3m"
    - "ret_6m"
    - "ret_12m"

buckets:
  growth_tech:
    sectors: ["IT", "정보기술", "커뮤니케이션서비스"]
    max_weight: 0.35
  cyclical:
    sectors: ["경기관련소비재", "금융", "산업재"]
    max_weight: 0.30
  real_assets:
    sectors: ["에너지", "소재", "부동산"]
    max_weight: 0.20
  defensive:
    sectors: ["건강관리", "필수소비재", "유틸리티"]
    max_weight: 0.25

risk:
  max_weight_per_stock: 0.08
  max_sector_weight: 0.30
  stop_loss: -0.20
